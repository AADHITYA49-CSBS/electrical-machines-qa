<!DOCTYPE html>
<html>
<head>
    <title>Ask Question</title>
</head>
<body>

<h2>Ask Electrical Machines Question</h2>

<form method="POST">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">
        Get Answer
    </button>
</form>

{% if answer %}

<hr>

<h3>Your Question</h3>
<p>{{ question }}</p>

<h3>AI Answer</h3>
<p>{{ answer }}</p>

{% endif %}

{% if error %}
<p style="color:red;">
    {{ error }}
</p>
{% endif %}

</body>
</html>
