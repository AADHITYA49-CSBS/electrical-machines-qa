<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
</head>
<body>

<h2>Register</h2>

{% if error %}
<p style="color:red;">
    {{ error }}
</p>
{% endif %}

<form method="POST">
    {% csrf_token %}

    <input
        type="text"
        name="username"
        placeholder="Username"
        required
    >

    <br><br>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required
    >

    <br><br>

    <button type="submit">
        Register
    </button>
</form>

<br>

<a href="{% url 'login' %}">
    Already have an account? Login
</a>

</body>
</html>
