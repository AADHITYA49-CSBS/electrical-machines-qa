{% extends 'base.html' %}

{% block title %}Login — ElectraMind AI{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-6 col-lg-4">
            <div class="glass p-4 mt-5">
                <h3 class="mb-3 text-center">Sign in to ElectraMind</h3>

                {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                {% endif %}

                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input class="form-control form-control-lg" type="text" name="username" placeholder="Username" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input class="form-control form-control-lg" type="password" name="password" placeholder="Password" required>
                    </div>

                    {% if next %}
                            <input type="hidden" name="next" value="{{ next }}">
                    {% elif request.GET.next %}
                            <input type="hidden" name="next" value="{{ request.GET.next }}">
                    {% endif %}

                    <div class="d-grid">
                        <button class="btn btn-modern btn-lg">Sign in</button>
                    </div>
                </form>

                <div class="mt-3 text-center small text-muted">
                    Don't have an account? <a href="{% url 'register' %}">Create one</a>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
